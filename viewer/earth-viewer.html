<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP1 Earth Map Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            pointer-events: all;
            max-width: 300px;
        }

        #controls h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #4CAF50;
        }

        .button-group {
            margin-bottom: 15px;
        }

        .button-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 4px 2px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        button.active {
            background: #2196F3;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            pointer-events: all;
            max-width: 300px;
            max-height: 80vh;
            overflow-y: auto;
        }

        #info-panel h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #4CAF50;
        }

        #node-info p {
            margin: 5px 0;
            font-size: 13px;
        }

        #node-info strong {
            color: #4CAF50;
        }

        #loading {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 30px;
            border-radius: 8px;
            pointer-events: all;
            min-width: 300px;
        }

        #loading-status {
            margin-bottom: 8px;
            font-size: 14px;
        }

        progress {
            width: 100%;
            height: 8px;
        }

        #help-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            pointer-events: all;
            font-size: 12px;
            max-width: 250px;
        }

        #help-overlay h4 {
            margin-bottom: 8px;
            color: #4CAF50;
        }

        #help-overlay p {
            margin: 4px 0;
            color: #ccc;
        }

        #help-overlay kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        .hidden {
            display: none;
        }

        #stats {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <div id="controls">
            <h2>RP1 Earth Viewer</h2>

            <div class="button-group">
                <label>View Mode:</label>
                <button id="btn-hierarchy" class="active" onclick="switchView('hierarchy')">Hierarchy</button>
                <button id="btn-explorer" onclick="switchView('explorer')">Explorer</button>
            </div>

            <div class="button-group" id="hierarchy-controls">
                <label>Layout:</label>
                <button id="btn-force" class="active" onclick="switchLayout('force')">Force</button>
                <button id="btn-spatial" onclick="switchLayout('spatial')">Spatial</button>
            </div>

            <div class="button-group">
                <button onclick="resetCamera()">Reset Camera</button>
                <button onclick="toggleHelp()">Help</button>
            </div>
        </div>

        <div id="info-panel">
            <h3>Selected Node</h3>
            <div id="node-info">
                <p>Click on a node to see details</p>
            </div>
            <button id="btn-load-children" onclick="loadSelectedNodeChildren()" disabled>Load Children</button>
        </div>

        <div id="loading" class="hidden">
            <div id="loading-status">Loading Earth map...</div>
            <progress id="loading-progress" max="100" value="0"></progress>
        </div>

        <div id="stats">
            FPS: <span id="fps">0</span> | Nodes: <span id="node-count">0</span>
        </div>

        <div id="help-overlay" class="hidden">
            <h4>Controls</h4>
            <p><strong>Hierarchy View:</strong></p>
            <p>Click: Select node</p>
            <p>Drag: Rotate view</p>
            <p>Scroll: Zoom</p>
            <p><strong>Explorer View:</strong></p>
            <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>: Move</p>
            <p><kbd>Space</kbd>/<kbd>Shift</kbd>: Up/Down</p>
            <p>Mouse: Look around (click to lock)</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Global variables
        let scene, camera, renderer, controls;
        let viewManager;
        let selectedNode = null;
        let loadedNodes = new Map();
        let serverUrl = '';

        // FPS tracking
        let frameCount = 0;
        let lastTime = performance.now();

        // Initialize
        init();
        animate();

        async function init() {
            // Setup Three.js scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                10000
            );
            camera.position.set(0, 200, 200);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Orbit controls for hierarchy view
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(100, 100, 50);
            scene.add(directionalLight);

            // Grid
            const gridHelper = new THREE.GridHelper(1000, 50, 0x444444, 0x222222);
            scene.add(gridHelper);

            // Raycaster for node selection
            setupRaycaster();

            // Window resize
            window.addEventListener('resize', onWindowResize);

            // Initialize view manager
            viewManager = new ViewManager();

            // Load map data
            await loadEarthMap();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update controls
            if (viewManager.currentView === 'hierarchy') {
                controls.update();
            } else if (viewManager.currentView === 'explorer') {
                viewManager.explorerView.update(0.016); // ~60fps
            }

            // Update force simulation if active
            if (viewManager.hierarchyView && viewManager.hierarchyMode === 'force') {
                viewManager.hierarchyView.updateForces();
            }

            renderer.render(scene, camera);

            // Update FPS
            updateFPS();
        }

        function updateFPS() {
            frameCount++;
            const currentTime = performance.now();
            if (currentTime >= lastTime + 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Data Loading
        async function loadEarthMap() {
            showLoading(true, 'Loading configuration...', 0);

            try {
                // Fetch earth.msf
                const configResponse = await fetch('https://cdn2.rp1.com/config/earth.msf');
                const config = await configResponse.json();

                // Parse connection string
                serverUrl = parseConnectString(config.map.connect);
                console.log('Server URL:', serverUrl);

                showLoading(true, 'Loading root...', 20);

                // Fetch RMROOT
                const rmrootResponse = await fetch(`https://${serverUrl}/rmroot/update`);
                const rmroot = await rmrootResponse.json();

                console.log('RMROOT:', rmroot);

                // Create root node
                const rootNode = {
                    id: 'RMROOT',
                    type: 'RMROOT',
                    sName: 'Earth',
                    children: rmroot.children || [],
                    transform: {
                        position: { dX: 0, dY: 0, dZ: 0 },
                        rotation: { dX: 0, dY: 0, dZ: 0, dW: 1 }
                    }
                };

                viewManager.hierarchyView.addNode(rootNode);
                loadedNodes.set('RMROOT', rootNode);

                showLoading(true, 'Loading containers...', 40);

                // Load RMCOBJECT containers (level 1)
                if (rmroot.children && rmroot.children.length > 0) {
                    let loaded = 0;
                    for (const childId of rmroot.children.slice(0, 10)) { // Limit to first 10
                        try {
                            const childResponse = await fetch(`https://${serverUrl}/rmcobject/update?ix=${childId}`);
                            const childData = await childResponse.json();

                            const childNode = {
                                id: childId,
                                type: 'RMCOBJECT',
                                sName: childData.sName || `Container ${childId}`,
                                children: childData.children || [],
                                transform: childData.transform || {
                                    position: { dX: 0, dY: 0, dZ: 0 },
                                    rotation: { dX: 0, dY: 0, dZ: 0, dW: 1 }
                                },
                                bound: childData.bound,
                                parentId: 'RMROOT'
                            };

                            viewManager.hierarchyView.addNode(childNode);
                            loadedNodes.set(childId, childNode);

                            loaded++;
                            showLoading(true, `Loading containers... (${loaded}/${rmroot.children.length})`,
                                       40 + (loaded / rmroot.children.length) * 40);
                        } catch (e) {
                            console.error(`Failed to load child ${childId}:`, e);
                        }
                    }
                }

                showLoading(true, 'Initializing layout...', 90);

                // Initialize force layout
                viewManager.hierarchyView.initializeForceLayout();

                showLoading(false);

                updateNodeCount();

            } catch (error) {
                console.error('Failed to load Earth map:', error);
                showLoading(true, `Error: ${error.message}`, 100);
                setTimeout(() => showLoading(false), 3000);
            }
        }

        function parseConnectString(connectStr) {
            // Parse "secure=true;server=prod-map-earth.rp1.com:443;session=RP1"
            const params = {};
            connectStr.split(';').forEach(part => {
                const [key, value] = part.split('=');
                params[key] = value;
            });

            // Extract server without port for HTTPS
            const server = params.server.split(':')[0];
            return server;
        }

        async function loadNodeChildren(nodeId, nodeType) {
            const endpoint = nodeType === 'RMCOBJECT' ? 'rmcobject' :
                           nodeType === 'RMTOBJECT' ? 'rmtobject' :
                           nodeType === 'RMPOBJECT' ? 'rmpobject' : null;

            if (!endpoint) return [];

            try {
                const response = await fetch(`https://${serverUrl}/${endpoint}/update?ix=${nodeId}`);
                const data = await response.json();
                return data.children || [];
            } catch (e) {
                console.error(`Failed to load children for ${nodeId}:`, e);
                return [];
            }
        }

        async function loadSelectedNodeChildren() {
            if (!selectedNode) return;

            const node = loadedNodes.get(selectedNode.userData.id);
            if (!node || !node.children || node.children.length === 0) {
                alert('No children to load');
                return;
            }

            showLoading(true, `Loading children of ${node.sName}...`, 0);

            const childType = node.type === 'RMCOBJECT' ? 'RMTOBJECT' :
                            node.type === 'RMTOBJECT' ? 'RMPOBJECT' : null;

            if (!childType) return;

            let loaded = 0;
            for (const childId of node.children.slice(0, 20)) { // Limit
                try {
                    const endpoint = childType === 'RMTOBJECT' ? 'rmtobject' : 'rmpobject';
                    const response = await fetch(`https://${serverUrl}/${endpoint}/update?ix=${childId}`);
                    const childData = await response.json();

                    const childNode = {
                        id: childId,
                        type: childType,
                        sName: childData.sName || `${childType} ${childId}`,
                        children: childData.children || [],
                        transform: childData.transform || {
                            position: { dX: 0, dY: 0, dZ: 0 },
                            rotation: { dX: 0, dY: 0, dZ: 0, dW: 1 }
                        },
                        bound: childData.bound,
                        parentId: node.id
                    };

                    viewManager.hierarchyView.addNode(childNode);
                    loadedNodes.set(childId, childNode);

                    loaded++;
                    showLoading(true, `Loading children... (${loaded}/${node.children.length})`,
                               (loaded / node.children.length) * 100);
                } catch (e) {
                    console.error(`Failed to load child ${childId}:`, e);
                }
            }

            showLoading(false);
            updateNodeCount();
        }

        // UI Functions
        function switchView(viewName) {
            viewManager.switchView(viewName);

            document.getElementById('btn-hierarchy').classList.toggle('active', viewName === 'hierarchy');
            document.getElementById('btn-explorer').classList.toggle('active', viewName === 'explorer');
            document.getElementById('hierarchy-controls').style.display = viewName === 'hierarchy' ? 'block' : 'none';

            // Enable/disable orbit controls
            controls.enabled = (viewName === 'hierarchy');
        }

        function switchLayout(mode) {
            viewManager.switchHierarchyMode(mode);

            document.getElementById('btn-force').classList.toggle('active', mode === 'force');
            document.getElementById('btn-spatial').classList.toggle('active', mode === 'spatial');
        }

        function resetCamera() {
            if (viewManager.currentView === 'hierarchy') {
                camera.position.set(0, 200, 200);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                controls.update();
            } else {
                camera.position.set(0, 50, 100);
                camera.rotation.set(0, 0, 0);
            }
        }

        function toggleHelp() {
            const help = document.getElementById('help-overlay');
            help.classList.toggle('hidden');
        }

        function showLoading(show, message = '', progress = 0) {
            const loading = document.getElementById('loading');
            loading.classList.toggle('hidden', !show);

            if (show) {
                document.getElementById('loading-status').textContent = message;
                document.getElementById('loading-progress').value = progress;
            }
        }

        function updateNodeCount() {
            document.getElementById('node-count').textContent = loadedNodes.size;
        }

        // Raycasting for node selection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function setupRaycaster() {
            renderer.domElement.addEventListener('click', onCanvasClick);
        }

        function onCanvasClick(event) {
            if (viewManager.currentView !== 'hierarchy') return;
            if (document.pointerLockElement) return; // Ignore if pointer locked

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const nodes = scene.children.filter(obj => obj.userData.isNode);
            const intersects = raycaster.intersectObjects(nodes);

            if (intersects.length > 0) {
                selectNode(intersects[0].object);
            }
        }

        function selectNode(nodeMesh) {
            // Deselect previous
            if (selectedNode) {
                selectedNode.material.emissive.setHex(0x000000);
            }

            // Select new
            selectedNode = nodeMesh;
            selectedNode.material.emissive.setHex(0x555555);

            // Update info panel
            const nodeData = loadedNodes.get(nodeMesh.userData.id);
            document.getElementById('node-info').innerHTML = `
                <p><strong>Name:</strong> ${nodeData.sName}</p>
                <p><strong>Type:</strong> ${nodeData.type}</p>
                <p><strong>ID:</strong> ${nodeData.id}</p>
                <p><strong>Children:</strong> ${nodeData.children?.length || 0}</p>
                ${nodeData.transform ? `<p><strong>Position:</strong> (${nodeData.transform.position.dX.toFixed(2)}, ${nodeData.transform.position.dY.toFixed(2)}, ${nodeData.transform.position.dZ.toFixed(2)})</p>` : ''}
            `;

            document.getElementById('btn-load-children').disabled =
                !nodeData.children || nodeData.children.length === 0;
        }

        // View Manager Class
        class ViewManager {
            constructor() {
                this.currentView = 'hierarchy';
                this.hierarchyMode = 'force';

                this.hierarchyView = new HierarchyView();
                this.explorerView = new ExplorerView();
            }

            switchView(viewName) {
                this.currentView = viewName;

                if (viewName === 'hierarchy') {
                    this.hierarchyView.show();
                    this.explorerView.hide();
                } else {
                    this.hierarchyView.hide();
                    this.explorerView.show();
                }
            }

            switchHierarchyMode(mode) {
                this.hierarchyMode = mode;

                if (mode === 'force') {
                    this.hierarchyView.switchToForceLayout();
                } else {
                    this.hierarchyView.switchToSpatialLayout();
                }
            }
        }

        // Hierarchy View Class
        class HierarchyView {
            constructor() {
                this.nodes = [];
                this.links = [];
                this.forceEnabled = true;
                this.visible = true;
            }

            addNode(nodeData) {
                const size = this.getNodeSize(nodeData.type);
                const color = this.getNodeColor(nodeData.type);

                const geometry = new THREE.SphereGeometry(size, 32, 32);
                const material = new THREE.MeshPhongMaterial({
                    color,
                    emissive: 0x000000,
                    shininess: 30
                });
                const mesh = new THREE.Mesh(geometry, material);

                // Set initial position (random or from parent)
                if (nodeData.parentId) {
                    const parent = this.nodes.find(n => n.data.id === nodeData.parentId);
                    if (parent) {
                        mesh.position.copy(parent.mesh.position);
                        mesh.position.x += (Math.random() - 0.5) * 50;
                        mesh.position.y += (Math.random() - 0.5) * 50;
                        mesh.position.z += (Math.random() - 0.5) * 50;

                        // Create link line
                        const points = [parent.mesh.position, mesh.position];
                        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x444444 });
                        const line = new THREE.Line(lineGeometry, lineMaterial);
                        scene.add(line);

                        this.links.push({ line, from: parent.mesh, to: mesh });
                    }
                } else {
                    mesh.position.set(0, 0, 0);
                }

                // Create text label
                const label = this.createTextSprite(nodeData.sName);
                label.position.y = size + 2;
                mesh.add(label);

                mesh.userData = {
                    isNode: true,
                    id: nodeData.id,
                    type: nodeData.type
                };

                // Initialize velocity for force simulation
                mesh.userData.velocity = new THREE.Vector3(0, 0, 0);

                scene.add(mesh);
                this.nodes.push({ mesh, data: nodeData });
            }

            getNodeSize(type) {
                if (type === 'RMROOT') return 10;
                if (type === 'RMCOBJECT') return 7;
                if (type === 'RMTOBJECT') return 4;
                return 2;
            }

            getNodeColor(type) {
                const colors = {
                    'RMROOT': 0xFFFFFF,
                    'RMCOBJECT': 0x4CAF50,
                    'RMTOBJECT': 0x2196F3,
                    'RMPOBJECT': 0xFFC107
                };
                return colors[type] || 0x999999;
            }

            createTextSprite(text) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 64;

                context.font = 'Bold 24px Arial';
                context.fillStyle = 'white';
                context.textAlign = 'center';
                context.fillText(text, 128, 40);

                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(material);
                sprite.scale.set(20, 5, 1);

                return sprite;
            }

            initializeForceLayout() {
                // Start force simulation
                this.forceEnabled = true;
            }

            updateForces() {
                if (!this.forceEnabled || !this.visible) return;

                const alpha = 0.1;
                const linkStrength = 0.1;
                const chargeStrength = 500;
                const centerStrength = 0.01;

                // Apply forces
                for (const node of this.nodes) {
                    const mesh = node.mesh;
                    const velocity = mesh.userData.velocity;

                    // Charge force (repulsion)
                    for (const other of this.nodes) {
                        if (node === other) continue;

                        const delta = new THREE.Vector3().subVectors(mesh.position, other.mesh.position);
                        const distance = Math.max(delta.length(), 1);
                        const force = chargeStrength / (distance * distance);

                        delta.normalize().multiplyScalar(force);
                        velocity.add(delta.multiplyScalar(alpha));
                    }

                    // Center force
                    const centerForce = mesh.position.clone().multiplyScalar(-centerStrength);
                    velocity.add(centerForce);

                    // Apply velocity
                    mesh.position.add(velocity.multiplyScalar(alpha));

                    // Damping
                    velocity.multiplyScalar(0.9);
                }

                // Link forces
                for (const link of this.links) {
                    const delta = new THREE.Vector3().subVectors(link.to.position, link.from.position);
                    const distance = delta.length();
                    const targetDistance = 50;
                    const force = (distance - targetDistance) * linkStrength;

                    delta.normalize().multiplyScalar(force * alpha);

                    link.from.userData.velocity.add(delta);
                    link.to.userData.velocity.sub(delta);

                    // Update line geometry
                    const points = [link.from.position, link.to.position];
                    link.line.geometry.setFromPoints(points);
                }
            }

            switchToForceLayout() {
                this.forceEnabled = true;
            }

            switchToSpatialLayout() {
                this.forceEnabled = false;

                // Position nodes at their actual coordinates
                for (const node of this.nodes) {
                    const pos = node.data.transform.position;
                    node.mesh.position.set(pos.dX, pos.dY, pos.dZ);
                }

                // Update links
                for (const link of this.links) {
                    const points = [link.from.position, link.to.position];
                    link.line.geometry.setFromPoints(points);
                }
            }

            show() {
                this.visible = true;
                for (const node of this.nodes) {
                    node.mesh.visible = true;
                }
                for (const link of this.links) {
                    link.line.visible = true;
                }
            }

            hide() {
                this.visible = false;
                for (const node of this.nodes) {
                    node.mesh.visible = false;
                }
                for (const link of this.links) {
                    link.line.visible = false;
                }
            }
        }

        // Explorer View Class
        class ExplorerView {
            constructor() {
                this.keys = {
                    forward: false,
                    backward: false,
                    left: false,
                    right: false,
                    up: false,
                    down: false
                };

                this.moveSpeed = 50;
                this.lookSpeed = 0.002;
                this.velocity = new THREE.Vector3();

                this.setupControls();
            }

            setupControls() {
                document.addEventListener('keydown', (e) => {
                    if (viewManager.currentView !== 'explorer') return;

                    switch(e.code) {
                        case 'KeyW': this.keys.forward = true; break;
                        case 'KeyS': this.keys.backward = true; break;
                        case 'KeyA': this.keys.left = true; break;
                        case 'KeyD': this.keys.right = true; break;
                        case 'Space': this.keys.up = true; e.preventDefault(); break;
                        case 'ShiftLeft': this.keys.down = true; break;
                    }
                });

                document.addEventListener('keyup', (e) => {
                    switch(e.code) {
                        case 'KeyW': this.keys.forward = false; break;
                        case 'KeyS': this.keys.backward = false; break;
                        case 'KeyA': this.keys.left = false; break;
                        case 'KeyD': this.keys.right = false; break;
                        case 'Space': this.keys.up = false; break;
                        case 'ShiftLeft': this.keys.down = false; break;
                    }
                });

                // Pointer lock for mouse look
                renderer.domElement.addEventListener('click', () => {
                    if (viewManager.currentView === 'explorer') {
                        renderer.domElement.requestPointerLock();
                    }
                });

                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement === renderer.domElement &&
                        viewManager.currentView === 'explorer') {
                        camera.rotation.y -= e.movementX * this.lookSpeed;
                        camera.rotation.x -= e.movementY * this.lookSpeed;
                        camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                    }
                });

                camera.rotation.order = 'YXZ';
            }

            update(deltaTime) {
                if (viewManager.currentView !== 'explorer') return;

                // Calculate movement direction
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyQuaternion(camera.quaternion);
                forward.y = 0;
                forward.normalize();

                const right = new THREE.Vector3(1, 0, 0);
                right.applyQuaternion(camera.quaternion);
                right.y = 0;
                right.normalize();

                const movement = new THREE.Vector3();

                if (this.keys.forward) movement.addScaledVector(forward, this.moveSpeed * deltaTime);
                if (this.keys.backward) movement.addScaledVector(forward, -this.moveSpeed * deltaTime);
                if (this.keys.left) movement.addScaledVector(right, -this.moveSpeed * deltaTime);
                if (this.keys.right) movement.addScaledVector(right, this.moveSpeed * deltaTime);
                if (this.keys.up) movement.y += this.moveSpeed * deltaTime;
                if (this.keys.down) movement.y -= this.moveSpeed * deltaTime;

                camera.position.add(movement);
            }

            show() {
                camera.rotation.order = 'YXZ';
            }

            hide() {
                camera.rotation.order = 'XYZ';
                if (document.pointerLockElement) {
                    document.exitPointerLock();
                }
            }
        }
    </script>
</body>
</html>
