<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RP1 C2A Authentication Test</title>
</head>
<body>
    <h1>RP1 C2A Authentication Test</h1>
    <div id="status">Initializing...</div>

    <!-- Load RP1 libraries from local files -->
    <script src="/lib/rp1/jquery-3.3.1.js"></script>
    <script src="/lib/rp1/socket.io.min.js"></script>
    <script src="/lib/rp1/MVMF.js"></script>
    <script src="/lib/rp1/MVSB.js"></script>
    <script src="/lib/rp1/MVRest.js"></script>
    <script src="/lib/rp1/MVXP.js"></script>
    <script src="/lib/rp1/MVIO.js"></script>
    <script src="/lib/rp1/MVRP.js"></script>
    <script src="/lib/rp1/MVRP_Map.js"></script>

    <script>
    window.testC2A = async function(email, password) {
        console.log('🔧 Testing C2A authentication...');

        // Initialize plugins
        MV.MVMF.Core.Plugin_Open('MVSB');
        MV.MVMF.Core.Plugin_Open('MVIO');
        MV.MVMF.Core.Plugin_Open('MVXP');
        MV.MVMF.Core.Plugin_Open('MVRP');
        console.log('✅ Plugins initialized');

        // Create MVSB service
        const pRequire = MV.MVMF.Core.Require('MVSB', null, 'MVSB');
        const serviceFactory = MV.MVSB.SERVICE.factory();
        // Connection string goes to Reference(), namespace goes to Create()
        // Use prod.rp1.com which is what the actual RP1 site uses
        const connectionString = 'secure=true;server=prod.rp1.com:443;session=RP1';
        const serviceRef = serviceFactory.Reference(connectionString);
        const pService = serviceRef.Create('metaversal/rp1');
        console.log('✅ Service created');

        // Create client
        const clientRef = new MV.MVSB.SERVICE.CLIENT.IREFERENCE(0);
        const pClient = pService.Client_Open(clientRef);
        console.log('✅ Client created');

        // Create C2A session
        const sessionFactory = MV.MVXP.SB_SESSION_C2A.factory();
        const pSession = sessionFactory.Create(pClient);
        console.log('✅ C2A Session created');

        // Connect
        console.log('🔌 Connecting...');
        pSession.Connect();

        // Wait for system connection
        await new Promise((resolve, reject) => {
            let attempts = 0;
            const checkInterval = setInterval(() => {
                attempts++;
                if (pClient.bSystemConnected) {
                    clearInterval(checkInterval);
                    console.log('✅ System connected!');
                    resolve();
                } else if (attempts > 150) {
                    clearInterval(checkInterval);
                    reject(new Error('Connection timeout'));
                } else if (attempts % 10 === 0) {
                    console.log(`Waiting for connection... (${attempts/10}s)`);
                }
            }, 100);
        });

        // Login
        console.log('🔑 Calling Login...');
        const loginResult = pSession.Login(email, password, false);
        console.log(`Login called, result: ${loginResult}`);

        // Wait for login
        await new Promise((resolve, reject) => {
            let attempts = 0;
            const checkInterval = setInterval(() => {
                attempts++;
                if (pClient.bLoggedIn) {
                    clearInterval(checkInterval);
                    console.log('✅ Login successful!');
                    console.log('User ID:', pClient.pLogin ? pClient.pLogin.twUserIx : 'N/A');
                    console.log('Session Token:', pClient.pLogin ? pClient.pLogin.acToken64U_Session : 'N/A');
                    resolve();
                } else if (attempts > 100) {
                    clearInterval(checkInterval);
                    reject(new Error('Login timeout'));
                } else if (attempts % 10 === 0) {
                    console.log(`Waiting for login... (${attempts/10}s)`);
                }
            }, 100);
        });

        document.getElementById('status').innerHTML = '<span style="color: green;">✅ Logged in successfully!</span>';

        return {
            status: 'success',
            userIx: pClient.pLogin.twUserIx,
            sessionToken: pClient.pLogin.acToken64U_Session
        };
    };

    console.log('✅ Page loaded. Call window.testC2A(email, password) from Puppeteer');
    </script>
</body>
</html>
